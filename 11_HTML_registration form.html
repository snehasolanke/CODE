<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<body>
    <h1>registration form</h1>
    <form>
        <lable for="name">NAME:</lable>
        <lable type="text" id="name" name="name" required>
        <br><br>
        <lable for="email">EMAIL:</lable>
        <input type="email" id="email" name="email" required>
        <br><br>
        <lable for="password">PASSWORD:</lable>
        <input type="password" id="password" name="password" required>
        <br><br>
        <lable for="phone">PHONE:</lable>
        <input type="phone" id="phone" name="phone" required>
        <br><br>
        <lable for="confirm password">CONFIRM PASSWORD:</lable>
        <input type="confirm password" id="confirm password" name="confirm password" required>
        <br><br>
        <button type="submit">register</button>
        <button type="reset">register</button>
    </form>
</body>
</html>
