<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganpati Bappa SVG</title>
<style>
    body{
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#fff7e6,#ffe0b2);
    }

    svg{
        width:500px;
        max-width:90vw;
        height:auto;
    }
</style>
</head>
<body>

<svg viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">

    <!-- Crown -->
    <path d="M170 120 L210 50 L250 100 L290 50 L330 120 Z"
          fill="#FFD700"
          stroke="#B8860B"
          stroke-width="4"/>

    <rect x="170" y="120" width="160" height="35"
          rx="10"
          fill="#FFC107"
          stroke="#B8860B"
          stroke-width="4"/>

    <!-- Halo -->
    <circle cx="250" cy="220" r="150"
            fill="none"
            stroke="#FFD54F"
            stroke-width="12"
            opacity="0.5"/>

    <!-- Head -->
    <ellipse cx="250" cy="230" rx="110" ry="120"
             fill="#FFB74D"
             stroke="#D2691E"
             stroke-width="4"/>

    <!-- Ears -->
    <ellipse cx="125" cy="240" rx="55" ry="80"
             fill="#FFB74D"
             stroke="#D2691E"
             stroke-width="4"/>

    <ellipse cx="375" cy="240" rx="55" ry="80"
             fill="#FFB74D"
             stroke="#D2691E"
             stroke-width="4"/>

    <!-- Eyes -->
    <path d="M200 220 Q215 205 230 220"
          stroke="#222"
          stroke-width="5"
          fill="none"/>

    <path d="M270 220 Q285 205 300 220"
          stroke="#222"
          stroke-width="5"
          fill="none"/>

    <!-- Tilak -->
    <path d="M250 175 L240 205 L260 205 Z"
          fill="#D32F2F"/>

    <!-- Trunk -->
    <path d="
        M250 235
        C250 280 220 300 220 340
        C220 390 280 390 280 340
        C280 310 255 300 255 275
        "
        fill="none"
        stroke="#D2691E"
        stroke-width="18"
        stroke-linecap="round"/>

    <!-- Tusks -->
    <path d="M220 260 Q190 270 200 295"
          fill="none"
          stroke="white"
          stroke-width="10"
          stroke-linecap="round"/>

    <path d="M280 260 Q310 270 300 295"
          fill="none"
          stroke="white"
          stroke-width="10"
          stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="250" cy="460" rx="120" ry="95"
             fill="#FFB74D"
             stroke="#D2691E"
             stroke-width="4"/>

    <!-- Arms -->
    <path d="M150 420 Q90 450 120 520"
          fill="none"
          stroke="#D2691E"
          stroke-width="18"
          stroke-linecap="round"/>

    <path d="M350 420 Q410 450 380 520"
          fill="none"
          stroke="#D2691E"
          stroke-width="18"
          stroke-linecap="round"/>

    <!-- Modak -->
    <path d="
        M380 500
        Q395 470 410 500
        Q410 530 395 540
        Q380 530 380 500
    "
    fill="#F4A460"
    stroke="#8B4513"
    stroke-width="3"/>

    <!-- Om Symbol -->
    <text x="250"
          y="485"
          text-anchor="middle"
          font-size="42"
          font-family="serif"
          fill="#D32F2F">
        ॐ
    </text>

    <!-- Feet -->
    <ellipse cx="200" cy="565" rx="35" ry="15"
             fill="#FFB74D"/>
    <ellipse cx="300" cy="565" rx="35" ry="15"
             fill="#FFB74D"/>

    <!-- Title -->
    <text x="250"
          y="35"
          text-anchor="middle"
          font-size="28"
          font-weight="bold"
          fill="#D32F2F">
        Ganpati Bappa Morya
    </text>

</svg>

</body>
</html>
