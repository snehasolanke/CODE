<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job registration form</title>
</head>
<body>
    <form>
        <h1>Job Registration Form</h1>
        <fieldset>
            <legend><h2>Personal Information</h2></legend>
            <label> full name</label>
            <input type="text" name="full name">
            <br><br>

            <label> fathers name</label>
            <input type="text" name="fathers name">
            <br><br>

            <label> date of birth</label>
            <input type="date" name="date of birth">
            <br><br>

            <label> gender</label>
            <input type="radio" name="gender" value="male">
            <label> Male</label>
            <input type="radio" name="gender" value="female">
            <label> Female</label>
            <input type="radio" name="gender" value="other">
            <label> Other</label>
            <br><br> 

            <label>mobile number</label>
            <input type="tel" name="mobile number">
            <br><br>

            <label>email</label>
            <input type="email" name="email">           
        <br><br>

        <label>marital status</label>
        <select name="marital status">
            <option value="single">Single</option>
            <option value="married">Married</option>
            <option value="divorced">Divorced</option>
        </select>
        </fieldset>
        <br><br>
        <fieldset>
            <label><h2>Education Form</h2></label>
            <label>10th percentage</label>
            <input type="number" name="10th percentage">
            <br><br>

            <label>12th percentage</label>
            <input type="number" name="12th percentage">    
        <br><br>
        
            <label>graduation percentage</label>
            <input type="number" name="graduation percentage">
            <br><br>

            <label> graduation </label>
            <input type="number" name=" graduation ">
            <br><br>

            <label>university</label>
            <input type="text" name="university">
            <br><br>

            <label>passing year</label>
            <input type="number" name="passing year">
            <br><br>

            <label>additional qualifications</label>
            <input type="text" name="additional qualifications">
            <br><br>
        </fieldset>
        <br>

        <fieldset>
            <label><h2> Experience details</h2></label>
            <label>total experience</label>
            <input type="text" name="total experience">
            <br><br>

            <label>designation</label>
            <input type="text" name="designation">
            <br><br>

            <label>duration</label>
            <input type="text" name="duration">
            <br><br>

            <label>current salary</label>
            <input type="text" name="current salary">
            <br><br>

            <label>skills</label>
            <input type="text" name="skills">
            </fieldset>
            <br>

            <fieldset>
                <label><h2>address details</h2></label>
                <label>address details</label>
                <textarea name="address details" rows="5" cols="30"></textarea>
                <br><br>

                <label>city</label>
                <input type="text" name="city">  
            </fieldset>

            <label>state</label>
            <input type="text" name="state">
            <br><br>

                <label>pincode</label>
                <input type="text" name="pincode">
                <br><br>

                <label>country</label>
                <input type="text" name="country">
               </fieldset>
                <br><br>

            <fieldset>
                <label><h2>photo & signature</h2></label>
                <label>upload photo</label>
                <input type="file" name="upload photo  ">
                <br><br>

                <label>upload signature</label>
                <input type="file" name="upload signature">
                </fieldset>
                <br><br>

                <fieldset>
                    <label><h2>required documents</h2></label>
                    <<lable> resume/cv:</lable>
                    <input type="file" name="uopload resume">
                    <br><br>

                    <label>Adhar card:</label>
                    <input type="file" name="upload adhar card">
                    <br><br>

                    <label>pan card:</label>
                    <input type="file" name="upload pan card">  
                    <br><br>

                    <label>10th mark sheet:</label>
                    <input type="file" name="upload 10th mark sheet">
                    <br><br>

                    <label>12th mark sheet:</label>
                    <input type="file" name="upload 12th mark sheet">
                    <br><br>

                    <label>graduation certificate:</label>
                    <input type="file" name="upload graduation certificate">
                    <br><br>

                    <label>experience certificate:</label>
                    <input type="file" name="upload experience certificate">    
                    <br><br>

                    <label>others documents:</label>
                    <input type="file" name="upload others documents">
                    </fieldset>
                    <br.<br>

                    <fieldset>
                        <legend><h2>declaration</h2></legend>
                        <input type="checkbox" name="declaration">
                        <label>I hereby declare that all the  information provided above is true and correct to the best of my knowledge.</label>
                        <br><br>
                        <input type="submit" value="submit">
                        <input type="reset" value="reset">
                        


    </form>

    
</body>
</html>
