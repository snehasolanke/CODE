<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list tag</title>
</head>
<body>
<h2>order list</h2>

<ol type="1">
    <li>soap</li>
    <li>pen</li>
    <li>notebook</li>
</ol>

<ol type="A">
    <li>bottel</li>
    <li>suger</li>
    <li>tea powder</li>
</ol>

<ol type="a">
    <li>rice</li>
    <li>salt</li>
    <li>oil</li>
</ol>

<ol type="|">
    <li>milk</li>
    <li>curd</li>
    <li>buttermilk</li>
</ol>

<h2>unorderd list</h2>
<ul type="disk">
    <li>chikoo</li>
    <li>orange</li>
    <li>mango</li>
</ul>

<ul type="cricket">
    <li>virat</li>
    <li>rohit</li>
    <li>hardik</li>
</ul>

<ul type="colour">
    <li>orange</li>
    <li>maroon</li>
    <li>black</li>
</ul>

<ul type="countries">
    <li>india</li>
    <li>china</li>
    <li>america</li>
</ul> 


</body>
</html>
